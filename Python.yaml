name: Run Python Script

on:
  push:
    branches: [ "main" ]  # Runs whenever you push to the main branch

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Uncomment the line below if you have a requirements.txt file
        # pip install -r requirements.txt

    - name: Execute Python script with Secrets
      env:
        MYBOT: ${{ secrets.BOT }}       # Replace with your secret name
        MYBOTID: ${{ secrets.BOTID }}     # Replace with your secret name
      run: python Coincode.py                   # Replace with your actual Python file name
